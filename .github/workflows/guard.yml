name: Guard

# Path-based trust boundary. A PR is "allowlisted" only if every changed file is
# within the machine's own zone (Lab posts + build machinery). Anything touching
# the core site, Wolf's writing/work, config, the engine's constitution
# (CYCLE.md), or .github/** is flagged for Wolf's manual merge.
#
# TIER SWITCH: this guard only auto-merges when the repo variable AUTONOMY_TIER
# is set to "B" (Tier B, hands-off). Unset/anything-else = Tier A: the guard
# LABELS ONLY and never merges — every PR waits for Wolf. This avoids the trap
# that `gh pr merge --auto` immediately merges a mergeable PR when there is no
# branch protection to wait behind. Tier B is only safe WITH branch protection
# requiring the `build` check (see engine/README.md).
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  path-guard:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: List changed files
        id: files
        run: |
          files=$(gh pr diff "$PR" --repo "$GITHUB_REPOSITORY" --name-only)
          echo "Changed files:"; echo "$files"
          {
            echo "list<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Evaluate against allowlist
        id: guard
        run: |
          allowed=1
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              src/content/lab/*|engine/BACKLOG.md|engine/run-cycle.mjs|engine/lib.mjs|engine/lib.test.mjs|engine/README.md|src/lib/*) ;;
              *) echo "protected: $f"; allowed=0 ;;
            esac
          done <<< '${{ steps.files.outputs.list }}'
          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (allowlisted PRs, Tier B only)
        if: steps.guard.outputs.allowed == '1' && vars.AUTONOMY_TIER == 'B'
        run: |
          gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --auto --squash \
            || echo "Could not enable auto-merge — PR left open for manual merge."

      - name: Tier A — allowlisted, auto-merge OFF
        if: steps.guard.outputs.allowed == '1' && vars.AUTONOMY_TIER != 'B'
        run: echo "✅ Allowlisted PR. Tier A (AUTONOMY_TIER != B) — auto-merge is OFF; left open for your manual merge."

      - name: Flag protected PRs for human review
        if: steps.guard.outputs.allowed != '1'
        run: |
          gh pr edit "$PR" --repo "$GITHUB_REPOSITORY" --add-label needs-human || true
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body "🔒 This PR touches **protected paths** (core site / your content / engine constitution / CI config). Auto-merge was **not** enabled — it needs your review and manual merge."
